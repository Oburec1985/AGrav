<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Определения маркеров -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>
  <!-- Гидростанция -->
  <rect x="50" y="100" width="180" height="120" fill="#d0ffd0" stroke="#000"/>
  <text x="140" y="130" font-family="Arial" font-size="12" text-anchor="middle" fill="#000">Гидростанция
    (насос, бак, охл.)</text>
  <!-- Фильтрация -->
  <rect x="260" y="115" width="120" height="40" fill="#c0c0ff" stroke="#000"/>
  <text x="320" y="140" font-family="Arial" font-size="12" text-anchor="middle" fill="#000">Фильтр (тонкая очистка)</text>
  <!-- Аккумулятор давления -->
  <ellipse cx="420" cy="135" rx="40" ry="30" fill="#ffe0b0" stroke="#000"/>
  <text x="420" y="140" font-family="Arial" font-size="12" text-anchor="middle" fill="#000">Аккумулятор</text>
  <!-- Главный поток P -->
  <line x1="230" y1="135" x2="260" y2="135" stroke="#000" marker-end="url(#arrow)"/>
  <line x1="380" y1="135" x2="460" y2="135" stroke="#000" marker-end="url(#arrow)"/>
  <text x="300" y="120" font-family="Arial" font-size="10" fill="#000">P 300 бар</text>
  <!-- Манипуляторы каналов: 4 коллекторы по 8 каналов -->
  <g id="collectors">
    <!-- Коллектор 1 -->
    <rect x="480" y="60" width="140" height="200" fill="#f0f0f0" stroke="#000"/>
    <text x="550" y="50" font-family="Arial" font-size="12" text-anchor="middle" fill="#000">Коллектор 1‑8</text>
    <!-- Коллектор 2 -->
    <rect x="640" y="60" width="140" height="200" fill="#f0f0f0" stroke="#000"/>
    <text x="710" y="50" font-family="Arial" font-size="12" text-anchor="middle" fill="#000">Коллектор 9‑16</text>
    <!-- Коллектор 3 -->
    <rect x="800" y="60" width="140" height="200" fill="#f0f0f0" stroke="#000"/>
    <text x="870" y="50" font-family="Arial" font-size="12" text-anchor="middle" fill="#000">Коллектор 17‑24</text>
    <!-- Коллектор 4 -->
    <rect x="960" y="60" width="140" height="200" fill="#f0f0f0" stroke="#000"/>
    <text x="1030" y="50" font-family="Arial" font-size="12" text-anchor="middle" fill="#000">Коллектор 25‑32</text>
  </g>
  <!-- Соединение от главного P к каждому коллектору -->
  <line x1="460" y1="135" x2="480" y2="135" stroke="#000" marker-end="url(#arrow)"/>
  <line x1="460" y1="135" x2="640" y2="135" stroke="#000" marker-end="url(#arrow)"/>
  <line x1="460" y1="135" x2="800" y2="135" stroke="#000" marker-end="url(#arrow)"/>
  <line x1="460" y1="135" x2="960" y2="135" stroke="#000" marker-end="url(#arrow)"/>
  <!-- Примерный канал внутри коллекторов -->
  <g id="channel_example" transform="translate(500,120)">
    <!-- Пропорциональный редукционный клапан -->
    <rect x="0" y="0" width="60" height="40" fill="#e0ffe0" stroke="#000"/>
    <text x="30" y="25" font-family="Arial" font-size="10" text-anchor="middle" fill="#000">Проп. редукц.
      клапан</text>
    <!-- Седельный клапан удержания -->
    <rect x="80" y="0" width="60" height="40" fill="#ffe0e0" stroke="#000"/>
    <text x="110" y="25" font-family="Arial" font-size="10" text-anchor="middle" fill="#000">Седельный
      клапан</text>
    <!-- Гидроцилиндр -->
    <rect x="160" y="0" width="80" height="50" fill="#e0e0ff" stroke="#000"/>
    <text x="200" y="30" font-family="Arial" font-size="10" text-anchor="middle" fill="#000">Гидронагружатель</text>
    <!-- Датчики -->
    <circle cx="260" cy="15" r="12" fill="#f0f0f0" stroke="#000"/>
    <text x="260" y="20" font-family="Arial" font-size="9" text-anchor="middle" fill="#000">Датчик
      силы</text>
    <circle cx="260" cy="45" r="12" fill="#f0f0f0" stroke="#000"/>
    <text x="260" y="50" font-family="Arial" font-size="9" text-anchor="middle" fill="#000">Датчик
      давления</text>
    <!-- Контроллер -->
    <rect x="300" y="0" width="80" height="60" fill="#d0d0ff" stroke="#000"/>
    <text x="340" y="30" font-family="Arial" font-size="10" text-anchor="middle" fill="#000">Контроллер
      канала</text>
    <!-- Обратная связь линии -->
    <line x1="260" y1="27" x2="300" y2="30" stroke="#000" marker-end="url(#arrow)"/>
    <line x1="260" y1="57" x2="300" y2="50" stroke="#000" marker-end="url(#arrow)"/>
    <!-- Клапан безопасного сброса -->
    <rect x="400" y="0" width="60" height="40" fill="#ffddaa" stroke="#000"/>
    <text x="430" y="25" font-family="Arial" font-size="10" text-anchor="middle" fill="#000">Клапан
      сброса</text>
    <!-- Т слив -->
    <line x1="460" y1="20" x2="520" y2="20" stroke="#000" marker-end="url(#arrow)"/>
    <rect x="520" y="5" width="40" height="30" fill="#c0c0c0" stroke="#000"/>
    <text x="540" y="25" font-family="Arial" font-size="8" text-anchor="middle" fill="#000">Т
      слив</text>
  </g>
  <!-- Ручной резерв (изолированный контур) -->
  <g id="manual_reserve" transform="translate(500,300)">
    <rect x="0" y="0" width="200" height="80" fill="#fff0f0" stroke="#000"/>
    <text x="100" y="-10" font-family="Arial" font-size="12" text-anchor="middle" fill="#000">Ручной резерв</text>
    <!-- Ручной насос -->
    <rect x="10" y="30" width="60" height="30" fill="#ffd0d0" stroke="#000"/>
    <text x="40" y="50" font-family="Arial" font-size="9" text-anchor="middle" fill="#000">Ручной насос</text>
    <!-- Переключающий манофольд -->
    <rect x="80" y="30" width="70" height="30" fill="#d0ffd0" stroke="#000"/>
    <text x="115" y="50" font-family="Arial" font-size="9" text-anchor="middle" fill="#000">Переключ.
      манофольд</text>
    <!-- Седельный клапан резерва -->
    <rect x="160" y="30" width="60" height="30" fill="#e0e0ff" stroke="#000"/>
    <text x="190" y="50" font-family="Arial" font-size="9" text-anchor="middle" fill="#000">Седельный
      клапан</text>
    <!-- Соединительные линии -->
    <line x1="70" y1="45" x2="80" y2="45" stroke="#000" marker-end="url(#arrow)"/>
    <line x1="150" y1="45" x2="160" y2="45" stroke="#000" marker-end="url(#arrow)"/>
  </g>
  <!-- Шкаф управления -->
  <rect x="50" y="500" width="200" height="150" fill="#e0e0e0" stroke="#000"/>
  <text x="150" y="520" font-family="Arial" font-size="12" text-anchor="middle" fill="#000">Шкаф управления
    (PLC, safety PLC, АЦП/ЦАП)</text>
  <!-- Шина управления -->
  <line x1="250" y1="575" x2="480" y2="140" stroke="#000" marker-end="url(#arrow)"/>
  <text x="300" y="560" font-family="Arial" font-size="10" fill="#000">Шина данных
    каналов</text>
  <!-- Обратный поток T (слив) к баку -->
  <line x1="560" y1="20" x2="560" y2="80" stroke="#000" marker-end="url(#arrow)"/>
  <line x1="560" y1="80" x2="70" y2="80" stroke="#000" marker-end="url(#arrow)"/>
  <text x="560" y="10" font-family="Arial" font-size="10" text-anchor="middle" fill="#000">Т слив</text>
  <!-- Обозначения: -->
  <text x="10" y="20" font-family="Arial" font-size="12" fill="#000">*Все линии - масляные, рабочее давление 300 бар</text>
</svg>
